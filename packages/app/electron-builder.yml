# electron-builder 設定(Windows 向け配布)。
#
# ターゲットに portable を選択した理由:
# - 単一の実行可能 exe をダウンロードしてそのまま起動できる。インストール/アンインストール不要。
# - 「常に Releases から最新 exe をダウンロードして即実行」という UI 開発中の運用に最も合う
#   (ローリングプレリリースを繰り返し差し替えても、テスターは毎回インストールし直さなくてよい)。
appId: com.keiba.evtool
productName: 競馬期待値分析ツール

# 生成物の出力先(リポジトリの .gitignore 対象 dist とは別ディレクトリ)。
directories:
  output: release
  buildResources: build

# 配布物に含めるファイル。renderer/main/preload のビルド成果物と package.json のみ。
# node_modules の本番依存(better-sqlite3)は electron-builder が自動で収集・同梱する。
#
# 【engines 不整合の注意】Electron 内蔵 Node とバンドル依存の engines がずれると、Electron 内でのみ
# 実行時に失敗しうる(素の Node で回る CI/テストでは検出できない)。元バグ: core が直接依存していた
# undici 8(engines Node>=22.19.0)が Electron 34 の内蔵 Node(20.18.x)と非互換で、undici の fetch を
# 呼ぶと Electron 内で失敗した。対策は2層 = (a) 主: HttpClient / Discord 送信へ Electron の net.fetch を注入、
# (b) 従: core の undici を cheerio 互換の ^7(Node>=20.18.1)へ整合。詳細は scripts/build-electron.mjs 参照。
files:
  - dist/**/*
  - package.json

# ネイティブモジュール(better-sqlite3)は asar 内から実行できないため展開して同梱する。
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

# 本番依存のネイティブモジュールを Electron の ABI 向けに再ビルドする(既定 true を明示)。
npmRebuild: true

win:
  target:
    - portable
  # アプリ/exe アイコン。build/icon.svg を唯一の正とし、`pnpm gen:icon` で生成した
  # マルチ解像度 .ico を使う(16〜256px を内包)。パスは packages/app プロジェクトからの相対。
  icon: build/icon.ico
  # exe ファイル名は ASCII 固定(日本語 productName だと配布ファイル名が文字化けしうるため)。
  artifactName: keiba-ev-tool-${version}-portable.${ext}

portable:
  # 起動時に展開する一時ディレクトリ名(既定でよいが固定して安定させる)。
  unpackDirName: keiba-ev-tool
